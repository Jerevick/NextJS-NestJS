# WP-0.1 local stack — see docker/README.md
services:
  # Postgres 16 + pgvector (spec: postgres:16 + vector extension; plain alpine lacks vector)
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      # Host 15432 avoids conflict with a local Windows PostgreSQL on 5432
      - "15432:5432"
    environment:
      POSTGRES_USER: unicore
      POSTGRES_PASSWORD: unicore
      POSTGRES_DB: unicore
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unicore -d unicore"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345 &&
      mc mb -p local/unicore || true &&
      mc anonymous set download local/unicore || true &&
      echo 'MinIO bucket unicore ready'
      "

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  queue-registry:
    image: node:22-alpine
    restart: on-failure
    working_dir: /scripts
    volumes:
      - ./docker/scripts:/scripts
    command: sh -c "npm install --omit=dev --silent && node register-bull-queues.mjs"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  bull-board:
    image: deadly0/bull-board:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BULL_VERSION: BULLMQ
      BULL_PREFIX: bull
    depends_on:
      redis:
        condition: service_healthy
      queue-registry:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
  minio_data:
